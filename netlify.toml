# Netlify deploy configuration.
# The app itself is static (index.html + extractor-core.js at the repo root).
# AI extraction runs behind a serverless function so the Gemini API key
# stays server-side (CLAUDE.md non-negotiable) — set GEMINI_API_KEY in
# Site configuration → Environment variables. Never commit it.
# Commerce endpoints (/api/*) route via each function's config.path and are
# inert until COMMERCE_ENABLED=true with full configuration (.env.example).

[build]
  publish = "."
  command = "npm install"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
