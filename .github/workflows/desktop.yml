# Phase E — build the Windows and macOS desktop installers on native runners.
#
# Linux can build neither an NSIS .exe (needs wine) nor a .dmg (needs macOS),
# so CI is the canonical build path: run this workflow and download the
# installers from the run's artifacts, or push a tag like `desktop-v1.0.0`
# and they are attached to a GitHub Release automatically.
#
# The installers are UNSIGNED — Windows SmartScreen and macOS Gatekeeper will
# warn on first open (right-click → Open on macOS). Code-signing and store
# submission need the owner's Apple Developer ID / Windows certificate; see
# desktop/README.md → NEEDS HUMAN ACTION.
name: Desktop installers

on:
  workflow_dispatch:
  push:
    tags: ['desktop-v*']

permissions:
  contents: write   # attach installers to the Release on tag builds

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            args: --win nsis
            out: |
              desktop/release/*.exe
          - os: macos-latest
            args: --mac dmg zip
            out: |
              desktop/release/*.dmg
              desktop/release/*-mac-*.zip
    runs-on: ${{ matrix.os }}
    defaults:
      run: { working-directory: desktop }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - run: npm install
      - run: npx electron-builder ${{ matrix.args }} --publish never
        env:
          # unsigned build: don't look for signing identities on the runner
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
      - uses: actions/upload-artifact@v4
        with:
          name: estimation101-${{ runner.os }}
          path: ${{ matrix.out }}
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/desktop-v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with: { path: installers, merge-multiple: true }
      - uses: softprops/action-gh-release@v2
        with:
          files: installers/*
          name: Estimation 101 desktop ${{ github.ref_name }}
          body: |
            Desktop installers for **Estimation 101 — Electrical Document Intelligence**.

            | Platform | File |
            |---|---|
            | Windows | `.exe` (NSIS installer) |
            | macOS | `.dmg` (drag to Applications) / `.zip` |

            The app is a native window around the deployed tool — it always runs the
            latest version and contains no API keys.

            ⚠ Unsigned builds: Windows SmartScreen / macOS Gatekeeper will warn on
            first launch (macOS: right-click the app → Open).
